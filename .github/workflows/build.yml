
lname: Build InUrFace

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unpack project zip
        shell: bash
        run: |
          set -euo pipefail
          ZIP_PATH=""
          for candidate in "$GITHUB_WORKSPACE/InUrFace-fixed-20260319-1351.zip" "$GITHUB_WORKSPACE/assets/InUrFace.zip" "$GITHUB_WORKSPACE/vendor/InUrFace.zip"; do
            if [ -f "$candidate" ]; then
              ZIP_PATH="$candidate"
              break
            fi
          done
          if [ -z "$ZIP_PATH" ]; then
            echo "InUrFace.zip not found"
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/inurface"
          unzip -q "$ZIP_PATH" -d "$RUNNER_TEMP/inurface"
          rm -rf "$RUNNER_TEMP/inurface/InUrFace/.github"
          cp -a "$RUNNER_TEMP/inurface/InUrFace/." "$GITHUB_WORKSPACE/"
          test -f "$GITHUB_WORKSPACE/gradlew"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Build debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: InUrFace-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
